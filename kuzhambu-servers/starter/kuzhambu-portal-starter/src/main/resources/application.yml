server:
  port: ${SERVER_PORT:20011}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api/portal}

spring:
  application:
    name: kuzhambu-portal-starter
  main:
    banner-mode: "off"
  datasource:
    driver-class-name: ${KUZHAMBU_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${KUZHAMBU_DB_URL:jdbc:mysql://127.0.0.1:3306/kuzhambu?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${KUZHAMBU_DB_USERNAME:kuzhambu}
    password: ${KUZHAMBU_DB_PASSWORD:}
  data:
    redis:
      url: ${KUZHAMBU_REDIS_URI:redis://127.0.0.1:6379/0}
      password: ${KUZHAMBU_REDIS_PASSWORD:}
      timeout: ${KUZHAMBU_REDIS_TIMEOUT:5s}
rocketmq:
  name-server: ${KUZHAMBU_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${KUZHAMBU_ROCKETMQ_PRODUCER_GROUP:kuzhambu-portal-starter-producer}

springdoc:
  api-docs:
    enabled: ${KUZHAMBU_OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${KUZHAMBU_OPENAPI_ENABLED:true}

jetcache:
  statIntervalMinutes: ${KUZHAMBU_CACHE_STAT_INTERVAL_MINUTES:15}
  local:
    default:
      type: linkedhashmap
      keyConvertor: FASTJSON2
  remote:
    default:
      type: redis.lettuce
      keyConvertor: FASTJSON2
      uri: ${KUZHAMBU_JETCACHE_REDIS_URI:${KUZHAMBU_REDIS_URI:redis://127.0.0.1:6379/0}}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  file:
    path: ${KUZHAMBU_LOG_PATH:logs}
  level:
    root: ${KUZHAMBU_LOG_LEVEL:INFO}
    com.thundax.kuzhambu: ${KUZHAMBU_APP_LOG_LEVEL:INFO}

kuzhambu:
  logging:
    max-history: ${KUZHAMBU_LOG_MAX_HISTORY:30}
    max-file-size: ${KUZHAMBU_LOG_MAX_FILE_SIZE:100MB}
    total-size-cap: ${KUZHAMBU_LOG_TOTAL_SIZE_CAP:5GB}
  oss:
    type: ${KUZHAMBU_OSS_TYPE:local}
    local:
      root-path: ${KUZHAMBU_OSS_LOCAL_ROOT_PATH:storage}
    s3:
      endpoint: ${KUZHAMBU_OSS_S3_ENDPOINT:}
      region: ${KUZHAMBU_OSS_S3_REGION:us-east-1}
      bucket: ${KUZHAMBU_OSS_S3_BUCKET:}
      access-key: ${KUZHAMBU_OSS_S3_ACCESS_KEY:}
      secret-key: ${KUZHAMBU_OSS_S3_SECRET_KEY:}
      path-style-access: ${KUZHAMBU_OSS_S3_PATH_STYLE_ACCESS:true}
  elasticsearch:
    uris: ${KUZHAMBU_ELASTICSEARCH_URIS:http://127.0.0.1:9200}
  storage:
    bucket-name: ${KUZHAMBU_STORAGE_BUCKET_NAME:local}
    content-path: ${KUZHAMBU_STORAGE_CONTENT_PATH:/api/storage/object/}
