name: PR Verify

on:
    pull_request:
        branches:
            - main
            - thundax-work
    workflow_dispatch:

permissions:
    contents: read

jobs:
    verify:
        name: Verify Repository
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Verify
              run: scripts/verify-all.sh
